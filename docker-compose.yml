services:
  postgres:
    image: postgres:17-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-idem-core}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-idem_core}
      POSTGRES_USER: ${POSTGRES_USER:-idem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-idem}
    ports:
      - "${PUBLIC_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-idem} -d ${POSTGRES_DB:-idem_core}"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:4.2
    container_name: ${COMPOSE_PROJECT_NAME:-idem-core}-kafka
    restart: unless-stopped
    ports:
      - "${PUBLIC_KAFKA_PORT:-9094}:9094"
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://${SERVER_HOST:-localhost}:${PUBLIC_KAFKA_PORT:-9094}
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
    volumes:
      - kafka_data:/bitnami/kafka

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ${COMPOSE_PROJECT_NAME:-idem-core}-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "${PUBLIC_KAFKA_UI_PORT:-8085}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: 'true'

  backend:
    build:
      context: ${BACKEND_BUILD_CONTEXT:-./backend}
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-idem-core}-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SERVER_PORT: 8080
      APP_POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-idem_core}
      APP_POSTGRES_USER: ${POSTGRES_USER:-idem}
      APP_POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-idem}
      APP_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "${PUBLIC_BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ${FRONTEND_BUILD_CONTEXT:-./frontend}
      dockerfile: Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-idem-core}-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${PUBLIC_FRONTEND_PORT:-3000}:80"

volumes:
  postgres_data:
  kafka_data:
